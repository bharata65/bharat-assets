<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SARKAR CRACKER</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 15px; 
        }
        h1 { 
            color: #FFD700; 
            text-align: center; 
            font-size: 28px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 25px;
        }
        .box { 
            background: #1a1a1a; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #FFD700; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.1);
        }
        h3 { margin-top: 0; color: #fff; }
        p { color: #ccc; font-size: 14px; margin: 10px 0; }
        button { 
            background: #FFD700; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <h1>SARKAR CRACKER</h1>
    
    <div class="box">
        <h3>WINGO 1 MINUTE</h3>
        <p>Daily Profit Limit: 2700rs</p>
        <p>Price: <b>203rs</b></p>
        <button onclick="window.location.href='steps.html?price=203'">BUY NOW</button>
    </div>

    <div class="box">
        <h3>WINGO 30 SECOND</h3>

        <button onclick="window.location.href='steps.html?price=276'">BUY NOW</button>
    </div>

    <div class="box">
        <h3>WINGO 3 MINUTE</h3>

    </div>

</body>
</html>
