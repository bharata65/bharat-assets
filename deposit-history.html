<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deposit History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; background: #f3f4f6; }</style>
</head>
<body class="p-4">
    <div class="flex items-center mb-6">
        <button onclick="history.back()" class="text-2xl">←</button>
        <h2 class="text-xl font-bold flex-grow text-center">Deposit History</h2>
    </div>

    <div id="history-container" class="space-y-3">
        </div>

    <script type="module">
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
        // ... (इथे Firebase Config आणि init code टाक)
        
        async function loadHistory() {
            const userId = localStorage.getItem("bharatUserSession");
            const q = query(collection(db, "deposits"), where("userId", "==", userId), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            
            const container = document.getElementById("history-container");
            container.innerHTML = "";

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm border border-gray-100">
                        <div>
                            <p class="font-bold text-gray-800">₹${data.amount}</p>
                            <p class="text-[10px] text-gray-400">${data.timestamp.toDate().toLocaleString()}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[10px] uppercase font-bold ${data.status === 'Processing' ? 'bg-yellow-100 text-yellow-600' : 'bg-green-100 text-green-600'}">
                            ${data.status}
                        </span>
                    </div>
                `;
            });
        }
        loadHistory();
    </script>
</body>
</html>
