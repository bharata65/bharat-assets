<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deposit Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #f3f4f6; }
        .amount-btn { border: 1px solid #e5e7eb; background: white; padding: 12px; border-radius: 8px; font-weight: bold; }
        .amount-btn.active { border: 2px solid #2563eb; color: #2563eb; background: #eff6ff; }
    </style>
</head>
<body class="p-4">
    <div class="flex items-center mb-6">
        <button onclick="history.back()" class="text-2xl mr-4">←</button>
        <h2 class="text-xl font-bold flex-grow text-center">Deposit</h2>
        <a href="deposit-history.html" class="text-blue-600 text-sm font-semibold">History</a>
    </div>

    <div class="bg-gray-900 text-white p-6 rounded-2xl shadow-lg mb-6 text-center">
        <p class="text-gray-400 text-sm">Available Balance</p>
        <h1 class="text-4xl font-bold mt-1">₹0.00</h1>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm mb-6">
        <h3 class="font-bold mb-4">Deposit amount</h3>
        <div class="grid grid-cols-3 gap-3 mb-4">
            <button class="amount-btn" onclick="setAmount(200, this)">₹ 200</button>
            <button class="amount-btn" onclick="setAmount(500, this)">₹ 500</button>
            <button class="amount-btn" onclick="setAmount(1000, this)">₹ 1K</button>
        </div>
        <input type="number" id="custom-amount" oninput="validateAmount()" class="w-full p-4 border rounded-lg focus:outline-none" placeholder="Enter amount (Min: 200)">
    </div>

    <button id="dep-btn" onclick="submitDeposit()" disabled class="w-full bg-gray-400 text-white p-4 rounded-xl font-bold transition-all cursor-not-allowed">
        Deposit
    </button>

    <script>
        function setAmount(val, btn) {
            document.getElementById('custom-amount').value = val;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            validateAmount();
        }
        function validateAmount() {
            const amount = document.getElementById('custom-amount').value;
            const btn = document.getElementById('dep-btn');
            if (parseInt(amount) >= 200) {
                btn.classList.remove('bg-gray-400', 'cursor-not-allowed');
                btn.classList.add('bg-blue-600');
                btn.disabled = false;
            } else {
                btn.classList.remove('bg-blue-600');
                btn.classList.add('bg-gray-400', 'cursor-not-allowed');
                btn.disabled = true;
            }
        }
        function submitDeposit() {
            const amount = document.getElementById('custom-amount').value;
            if (amount >= 200) {
                localStorage.setItem("lastAmount", amount);
                // पूर्ण पाथ वापरला आहे
                window.location.href = "/bharat-assets/payment-gateway.html";
            }
        }
    </script>
</body>
</html>
