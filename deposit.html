<!-- नवीन लोडर (हे <body> च्या सुरुवातीला टाक) -->
<div id="loader" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600"></div>
</div>

<script>
    function proceed() {
        const amt = document.getElementById('custom-amount').value;
        if(amt < 200) return;
        
        // Loader दाखवा
        document.getElementById('loader').classList.remove('hidden');
        
        // 2 सेकंदानंतर रिडायरेक्ट
        setTimeout(() => {
            window.location.href = "payment-gateway.html";
        }, 2000);
    }
</script>
