<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #050505; color: white; }
        .glass-card { background: #111; border: 1px solid #222; border-radius: 24px; padding: 24px; }
    </style>
</head>
<body class="p-4">

    <div class="flex items-center mb-6">
        <button onclick="history.back()" class="text-2xl">←</button>
        <h2 class="text-xl font-bold flex-grow text-center">Deposit</h2>
    </div>

    <div class="glass-card mb-6 bg-gradient-to-br from-gray-900 to-black text-center">
        <p class="text-gray-400 text-sm">Available Balance</p>
        <h1 class="text-4xl font-bold mt-1" id="balance">₹0.00</h1>
    </div>

    <div class="glass-card mb-6">
        <label class="text-gray-400 text-sm">Enter Amount (Min: ₹200)</label>
        <input type="number" id="dep-amount" oninput="validateAmount()" 
               class="w-full bg-transparent text-3xl font-bold border-b border-gray-800 py-4 focus:outline-none" 
               placeholder="₹ 0">
    </div>

    <button id="dep-btn" onclick="proceedToPayment()" disabled 
            class="w-full py-4 rounded-xl font-bold bg-gray-800 text-gray-500 transition-all">
        Deposit
    </button>

    <script>
        function validateAmount() {
            const amount = document.getElementById('dep-amount').value;
            const btn = document.getElementById('dep-btn');
            
            if (amount >= 200) {
                btn.classList.replace('bg-gray-800', 'bg-blue-600');
                btn.classList.replace('text-gray-500', 'text-white');
                btn.disabled = false;
            } else {
                btn.classList.replace('bg-blue-600', 'bg-gray-800');
                btn.classList.replace('text-white', 'text-gray-500');
                btn.disabled = true;
            }
        }

        function proceedToPayment() {
            const amount = document.getElementById('dep-amount').value;
            alert("Redirecting to Gateway for ₹" + amount);
        }
    </script>
</body>
</html>
