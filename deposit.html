<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f3f4f6; }
        .amount-btn { border: 1px solid #e5e7eb; background: white; padding: 12px; border-radius: 8px; font-weight: bold; transition: all 0.3s; }
        .amount-btn.active { border: 2px solid #2563eb; color: #2563eb; background: #eff6ff; }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="flex items-center mb-6">
        <button onclick="history.back()" class="text-2xl mr-4">←</button>
        <h2 class="text-xl font-bold flex-grow text-center">Deposit</h2>
        <a href="deposit-history.html" class="text-sm text-blue-600 font-semibold">Deposit history</a>
    </div>

    <div class="bg-gray-900 text-white p-6 rounded-2xl shadow-lg mb-6 text-center">
        <p class="text-gray-400 text-sm">Available Balance</p>
        <h1 class="text-4xl font-bold mt-1" id="balance">₹0.00</h1>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm mb-6">
        <h3 class="font-bold mb-4">Deposit amount</h3>
        <div class="grid grid-cols-3 gap-3 mb-4">
            <button class="amount-btn" onclick="setAmount(100, this)">₹ 100</button>
            <button class="amount-btn" onclick="setAmount(200, this)">₹ 200</button>
            <button class="amount-btn" onclick="setAmount(500, this)">₹ 500</button>
            <button class="amount-btn" onclick="setAmount(1000, this)">₹ 1K</button>
            <button class="amount-btn" onclick="setAmount(2000, this)">₹ 2K</button>
            <button class="amount-btn" onclick="setAmount(5000, this)">₹ 5K</button>
        </div>
        <input type="number" id="custom-amount" oninput="checkInput()" class="w-full p-4 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Min: ₹200.00">
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 text-sm text-gray-600">
        <h3 class="font-bold text-black mb-3">Recharge instructions</h3>
        <ul class="list-disc pl-4 space-y-2">
            <li>Minimum deposit amount is <span class="font-bold text-red-500">₹200</span>.</li>
            <li>The transfer amount must match the order you created.</li>
            <li>Do not cancel the order after the money has been transferred.</li>
        </ul>
    </div>

    <button id="dep-btn" onclick="proceedToPayment()" disabled class="w-full bg-gray-300 text-gray-500 p-4 rounded-xl font-bold transition-all">
        Deposit
    </button>

    <script>
        function setAmount(val, btn) {
            document.getElementById('custom-amount').value = val;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            checkInput();
        }

        function checkInput() {
            const amount = document.getElementById('custom-amount').value;
            const btn = document.getElementById('dep-btn');
            if (amount >= 200) {
                btn.classList.replace('bg-gray-300', 'bg-blue-600');
                btn.classList.replace('text-gray-500', 'text-white');
                btn.disabled = false;
            } else {
                btn.classList.replace('bg-blue-600', 'bg-gray-300');
                btn.classList.replace('text-white', 'text-gray-500');
                btn.disabled = true;
            }
        }

        function proceedToPayment() {
            const amount = document.getElementById('custom-amount').value;
            alert("Redirecting to secure gateway for ₹" + amount);
        }
    </script>
</body>
</html>
