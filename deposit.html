<!-- नवीन लोडिंग ॲनिमेशन - हे बटनच्या आत किंवा वर दाखवता येते -->
<div id="loader" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-white"></div>
</div>

<script>
    function proceed() {
        const amt = document.getElementById('custom-amount').value;
        if(amt < 200) return;

        // पॉपअप ऐवजी लोडर दाखवा
        document.getElementById('loader').classList.remove('hidden');
        
        // १-२ सेकंद थांबून रिडायरेक्ट
        setTimeout(() => {
            window.location.href = "payment-gateway.html";
        }, 1500); 
    }
</script>
