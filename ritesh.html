<!DOCTYPE html>
<html>
<head>
    <title>SARKAR ADMIN</title>
    <style>
        body { background: #000; color: #0f0; padding: 20px; font-family: monospace; }
        .data-box { border: 1px solid #0f0; padding: 20px; }
    </style>
</head>
<body>
    <h1>Admin Panel - RITESH</h1>
    <div class="data-box" id="adminData">Loading user activity...</div>
    <script>
        // LocalStorage वरून डेटा फेंच करणे
        let userData = localStorage.getItem('user');
        document.getElementById('adminData').innerHTML = "Last Registered: " + (userData || "No data");
    </script>
</body>
</html>
