<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #111; color: #0f0; padding: 20px; font-family: monospace; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #333; padding: 10px; }
    </style>
</head>
<body>
    <h1>Admin Panel - RITESH</h1>
    <table>
        <thead><tr><th>Name</th><th>WhatsApp</th><th>UTR (Payments)</th></tr></thead>
        <tbody id="adminTable"></tbody>
    </table>

    <script>
        const firebaseConfig = { /* इथे तुमची Firebase Config टाका */ };
        firebase.initializeApp(firebaseConfig);
        
        firebase.database().ref('users').on('value', (snapshot) => {
            let table = "";
            snapshot.forEach((child) => {
                let u = child.val();
                table += `<tr><td>${u.name}</td><td>${u.whatsapp}</td><td>${u.utr || 'No Payment'}</td></tr>`;
            });
            document.getElementById('adminTable').innerHTML = table;
        });
    </script>
</body>
</html>
