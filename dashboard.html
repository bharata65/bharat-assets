<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Share's | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; background: #050505; color: white; }</style>
</head>
<body class="pb-24">
    <header class="p-6 bg-gradient-to-r from-blue-600 to-indigo-700 rounded-b-3xl">
        <h1 class="text-xl font-bold">Bharat Share's</h1>
        <p class="text-xs opacity-80">Portfolio Value: ₹0.00</p>
    </header>

    <main class="p-4 space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <button onclick="window.location.href='deposit.html'" class="bg-emerald-600 p-4 rounded-2xl font-bold">Deposit</button>
            <button onclick="window.location.href='withdraw.html'" class="bg-rose-600 p-4 rounded-2xl font-bold">Withdraw</button>
        </div>
        <div id="shares-container" class="space-y-4 mt-6">
            </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-gray-900 border-t border-gray-800 flex justify-around p-4">
        <a href="dashboard.html" class="text-blue-500">Home</a>
        <a href="shares.html" class="text-gray-400">My Shares</a>
        <a href="account.html" class="text-gray-400">Account</a>
    </nav>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
