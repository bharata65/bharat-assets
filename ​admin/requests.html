<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Requests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="p-6">
    <div class="brand-header">Admin Request Center</div>

    <!-- Request List -->
    <div id="request-list" class="mt-6 space-y-4">
        <h2 class="text-xl font-bold">Pending Requests</h2>
        <!-- रिक्वेस्ट्स इथे दिसतील -->
    </div>

    <script type="module">
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
        const db = getFirestore();

        // रिअल-टाइम अपडेट्स
        onSnapshot(collection(db, "withdrawalRequests"), (snapshot) => {
            const list = document.getElementById('request-list');
            list.innerHTML = ""; // जुनी लिस्ट पुसून टाका
            
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if(data.status === "pending") {
                    list.innerHTML += `
                        <div class="glass-panel">
                            <p>Amount: ₹${data.amount}</p>
                            <button onclick="approve('${docSnap.id}')" class="bg-green-600 px-4 py-2 mt-2 rounded">Approve</button>
                        </div>
                    `;
                }
            });
        });

        // Approve Function
        window.approve = async (id) => {
            await updateDoc(doc(db, "withdrawalRequests", id), { status: "approved" });
            alert("Request Approved!");
        };
    </script>
</body>
</html>
