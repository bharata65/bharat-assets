<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">ArUpiPay</h2>
            <button class="bg-red-100 text-red-500 px-3 py-1 rounded-full text-xs font-bold">Customer Service</button>
        </div>

        <div class="card mb-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold" id="disp-amt">₹0.00</h1>
            <span id="timer" class="text-red-500 font-bold">14:35</span>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-cyan-100 border-2 border-cyan-400 p-3 rounded-xl text-center font-bold">Paytm</div>
            <div class="bg-purple-100 border-2 border-purple-400 p-3 rounded-xl text-center font-bold">PhonePe</div>
        </div>

        <div class="card text-center mb-4">
            <div id="qrcode" class="flex justify-center mb-4"></div>
            <p class="text-xs text-gray-500">1. Please use another device to scan QR</p>
            <p class="text-xs text-gray-500">2. If you scan from gallery, amount may be limited</p>
        </div>

        <div class="card mb-6">
            <label class="block text-sm font-bold mb-2">Input UTR/ Paste UTR</label>
            <div class="flex border-2 border-gray-200 rounded-xl overflow-hidden">
                <input type="text" id="utr-input" placeholder="Input 12 digits here" class="w-full p-3 outline-none">
                <button onclick="pasteUTR()" class="bg-red-400 text-white px-4 font-bold">Paste</button>
            </div>
            <p class="text-[10px] text-red-600 mt-2 italic font-bold">If you do not back fill UTR/ paste UTR, 100% will fail.</p>
        </div>

        <button onclick="submitUTR()" class="w-full bg-teal-600 text-white py-4 rounded-xl font-bold text-lg">Payment Completed</button>
    </div>

    <script>
        const amt = localStorage.getItem("lastAmount") || "200";
        document.getElementById('disp-amt').innerText = "₹" + amt;
        new QRCode(document.getElementById("qrcode"), { text: "upi://pay?pa=7186024384801SB1024@mairtel&am="+amt, width: 180, height: 180 });

        let time = 875;
        setInterval(() => {
            time--;
            let m = Math.floor(time / 60);
            let s = time % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }, 1000);

        async function pasteUTR() {
            const text = await navigator.clipboard.readText();
            document.getElementById('utr-input').value = text;
        }

        function submitUTR() {
            const utr = document.getElementById('utr-input').value;
            if(utr.length < 12) { alert("Please enter 12 digit UTR"); return; }
            alert("UTR Submitted Successfully!");
            // पाथ बरोबर केला आहे
            window.location.href = "/bharat-assets/deposit-history.html";
        }
    </script>
</body>
</html>
