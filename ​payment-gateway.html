<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #f0f2f5; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4">ArUpiPay</h2>
        <div class="card mb-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold" id="disp-amt">₹0.00</h1>
            <span id="timer" class="text-red-500 font-bold">14:35</span>
        </div>
        <div class="card text-center mb-4">
            <div id="qrcode" class="flex justify-center mb-4"></div>
        </div>
        <div class="card mb-6">
            <input type="text" id="utr-input" placeholder="Input 12 digits here" class="w-full p-3 border rounded-xl outline-none mb-2">
            <button onclick="submitUTR()" class="w-full bg-teal-600 text-white py-4 rounded-xl font-bold">Payment Completed</button>
        </div>
    </div>
    <script>
        const amt = localStorage.getItem("lastAmount") || "200";
        document.getElementById('disp-amt').innerText = "₹" + amt;
        new QRCode(document.getElementById("qrcode"), { text: "upi://pay?pa=7186024384801SB1024@mairtel&am="+amt, width: 180, height: 180 });
        function submitUTR() {
            const utr = document.getElementById('utr-input').value;
            if(utr.length < 12) { alert("Please enter 12 digit UTR"); return; }
            // पूर्ण पाथ वापरला आहे
            window.location.href = "/bharat-assets/deposit-history.html";
        }
    </script>
</body>
</html>
