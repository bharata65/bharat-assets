<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl p-6 shadow-xl">
        <h1 class="text-2xl font-bold mb-4" id="disp-amt">₹0.00</h1>
        <div id="qrcode" class="flex justify-center mb-6"></div>
        
        <input type="text" id="utr-input" placeholder="Input 12 digits UTR" class="w-full p-4 border rounded-xl mb-4">
        
        <button onclick="submitUTR()" class="w-full bg-teal-600 text-white py-4 rounded-xl font-bold">Payment Completed</button>
    </div>

    <script>
        const amt = localStorage.getItem("lastAmount") || "200";
        document.getElementById('disp-amt').innerText = "₹" + amt;
        new QRCode(document.getElementById("qrcode"), { text: "upi://pay?pa=7186024384801SB1024@mairtel&am="+amt, width: 180, height: 180 });

        function submitUTR() {
            const utr = document.getElementById('utr-input').value;
            if(utr.length < 12) { alert("Invalid UTR"); return; }
            
            // फाईल पाथ फिक्स केला आहे
            window.location.href = "/bharat-assets/deposit-history.html";
        }
    </script>
</body>
</html>
