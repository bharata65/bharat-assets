<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl p-6 shadow-xl">
        <h1 class="text-3xl font-bold text-teal-600 mb-1" id="disp-amt">₹0.00</h1>
        <p class="text-sm text-gray-500 mb-4">Mobile QR payment at <span id="timer" class="text-red-500 font-bold">05:00</span></p>

        <div class="bg-gray-100 p-4 rounded-2xl mb-4 flex justify-center">
            <div id="qrcode"></div>
        </div>

        <div class="flex justify-center gap-4 mb-6 opacity-70">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/PhonePe_Logo.svg/1200px-PhonePe_Logo.svg.png" class="w-8 h-8">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Paytm_logo.png/1200px-Paytm_logo.png" class="w-8 h-8">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_Pay_logo.svg/1200px-Google_Pay_logo.svg.png" class="w-8 h-8">
        </div>

        <input type="text" id="utr-input" placeholder="Enter 12-digit UTR number" class="w-full p-4 bg-gray-50 border rounded-xl mb-4">
        
        <div class="flex gap-4">
            <button onclick="cancelTrade()" class="flex-1 border py-3 rounded-xl font-bold">Trade cancelled</button>
            <button onclick="submitUTR()" class="flex-1 bg-teal-600 text-white py-3 rounded-xl font-bold">Payment Completed</button>
        </div>
    </div>

    <script>
        const amt = localStorage.getItem("lastAmount") || "200";
        document.getElementById('disp-amt').innerText = "₹" + amt;
        new QRCode(document.getElementById("qrcode"), "upi://pay?pa=7186024384801SB1024@mairtel&am="+amt);

        function cancelTrade() {
            if(confirm("Are you sure you want to cancel the trade?")) {
                window.location.href = "dashboard.html";
            }
        }

        async function submitUTR() {
            const utr = document.getElementById('utr-input').value;
            if(utr.length < 9) { alert("Please enter valid UTR"); return; }
            
            // इथे Firebase ला UTR सह रेकॉर्ड सेव्ह करा (हे लॉजिक app.js मध्ये आहे)
            alert("UTR Submitted! Redirecting to History...");
            window.location.href = "deposit-history.html";
        }
    </script>
</body>
</html>
