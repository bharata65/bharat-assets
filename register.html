<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Assets | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-gray-700">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Account Register</h2>
        
        <input type="number" id="phone" placeholder="Mobile Number" class="w-full p-3 mb-4 bg-gray-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
        <input type="password" id="pass" placeholder="4 Digit Password" maxlength="4" class="w-full p-3 mb-4 bg-gray-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
        <input type="password" id="cpass" placeholder="Confirm Password" maxlength="4" class="w-full p-3 mb-4 bg-gray-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
        
        <label class="flex items-center text-sm mb-6">
            <input type="checkbox" id="agree" class="mr-2"> I agree to Terms & Policy
        </label>
        
        <button onclick="registerUser()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold transition-all">Continue</button>
        
        <p class="mt-4 text-center text-sm text-gray-400">Already have an account? <a href="index.html" class="text-blue-400">Login</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkA8HNQd8kDA8uLP6hNWgkjF78d3wKXbU",
            authDomain: "bharat-digital-assets.firebaseapp.com",
            projectId: "bharat-digital-assets",
            storageBucket: "bharat-digital-assets.appspot.com",
            messagingSenderId: "451769882363",
            appId: "1:451769882363:web:f88db52e495d8456d5425e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.registerUser = async () => {
            const phone = document.getElementById("phone").value;
            const pass = document.getElementById("pass").value;
            const cpass = document.getElementById("cpass").value;
            const agree = document.getElementById("agree").checked;

            if (pass !== cpass) { alert("Password do not match!"); return; }
            if (!agree) { alert("Please agree to policy!"); return; }

            try {
                await addDoc(collection(db, "users"), {
                    number: phone,
                    password: pass,
                    balance: 0,
                    status: "active"
                });
                alert("Registered Successfully!");
                window.location.href = "index.html";
            } catch (e) {
                alert("Error: " + e.message);
            }
        };
    </script>
</body>
</html>
