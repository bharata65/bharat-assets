<!DOCTYPE html>
<html lang="mr">
<head>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="brand-header">Bharat Share's</div>
    
    <div class="p-6">
        <h2 class="text-2xl font-bold mb-6">Create Account</h2>
        <input id="num" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl mb-4" placeholder="10 Digit Number">
        <input id="pass" type="password" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl mb-4" placeholder="4 Digit Password">
        <label class="flex items-center mb-6">
            <input type="checkbox" id="agree" class="mr-2"> Agree to terms
        </label>
        <button onclick="registerUser()" class="w-full bg-blue-600 p-4 rounded-xl font-bold">Continue</button>
    </div>
</body>
</html>
