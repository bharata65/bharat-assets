<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #FFD700; }
        input { width: 80%; padding: 12px; margin: 10px; border-radius: 8px; border: none; }
        button { background: #FFD700; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SARKAR CRACKER</h1>
    <div class="card" id="reg">
        <h3>Register</h3>
        <input type="text" id="nm" placeholder="Full Name"><br>
        <input type="text" id="wh" placeholder="WhatsApp Number"><br>
        <input type="password" id="pw" placeholder="4 Digit Password" maxlength="4"><br>
        <button onclick="window.location.href='home.html'">REGISTER</button>
        <p>Already have account? <a href="login.html" style="color:gold;">Login</a></p>
    </div>
</body>
</html>
