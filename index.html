<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bharat Share's</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f7fc;
color:#0f172a;
}

.page{
display:none;
}

.page.active{
display:flex;
}

.auth-page{
min-height:100vh;
justify-content:center;
align-items:center;
padding:25px;
}

.card{
width:100%;
max-width:430px;
background:#fff;
padding:35px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.logo{
font-size:34px;
font-weight:800;
text-align:center;
margin-bottom:8px;
}

.sub{
text-align:center;
color:#64748b;
margin-bottom:30px;
}

.input-box{
margin-bottom:18px;
}

.input-box label{
display:block;
font-size:14px;
font-weight:600;
margin-bottom:8px;
}

.input-box input{
width:100%;
padding:17px;
border:1px solid #e2e8f0;
border-radius:16px;
outline:none;
font-size:15px;
}

.input-box input:focus{
border-color:#2563eb;
}

.check{
display:flex;
gap:10px;
margin-bottom:22px;
font-size:14px;
color:#64748b;
}

.btn{
width:100%;
padding:17px;
border:none;
background:#2563eb;
color:white;
border-radius:16px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.switch{
margin-top:25px;
text-align:center;
font-size:14px;
color:#64748b;
}

.switch span{
color:#2563eb;
font-weight:600;
cursor:pointer;
}

#toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#0f172a;
color:white;
padding:16px 24px;
border-radius:18px;
display:none;
z-index:99999;
}

#toast.show{
display:block;
}

.home-page{
padding:25px;
}

.header{
background:#0f172a;
color:white;
padding:25px;
border-radius:25px;
}

.header h2{
font-size:30px;
}

.header p{
opacity:.8;
margin-top:6px;
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- REGISTER -->

<div id="registerPage"
class="page auth-page active">

<div class="card">

<div class="logo">
Bharat Share's
</div>

<div class="sub">
Create your investment account
</div>

<div class="input-box">
<label>Mobile Number</label>
<input id="regMobile"
placeholder="Enter mobile number">
</div>

<div class="input-box">
<label>Password</label>
<input id="regPassword"
type="password"
placeholder="Enter password">
</div>

<div class="input-box">
<label>Confirm Password</label>
<input id="regConfirm"
type="password"
placeholder="Confirm password">
</div>

<div class="check">
<input id="agree"
type="checkbox">

<div>
I agree to Terms & Conditions
</div>
</div>

<button
class="btn"
id="registerBtn">
Create Account
</button>

<div class="switch">
Already have an account?
<span onclick="showPage('loginPage')">
Login
</span>
</div>

</div>

</div>

<!-- LOGIN -->

<div id="loginPage"
class="page auth-page">

<div class="card">

<div class="logo">
Bharat Share's
</div>

<div class="sub">
Welcome back
</div>

<div class="input-box">
<label>Mobile Number</label>
<input id="loginMobile"
placeholder="Enter mobile number">
</div>

<div class="input-box">
<label>Password</label>
<input id="loginPassword"
type="password"
placeholder="Enter password">
</div>

<button
class="btn"
id="loginBtn">
Login
</button>

<div class="switch">
Don't have an account?
<span onclick="showPage('registerPage')">
Register
</span>
</div>

</div>

</div>

<!-- HOME PLACEHOLDER -->

<div id="homePage"
class="page">

<div class="home-page">

<div class="header">
<h2>Bharat Share's</h2>
<p>Investment Dashboard</p>
</div>

</div>

</div>

<script>
function showPage(page){

document
.querySelectorAll(".page")
.forEach(p=>{
p.classList.remove("active");
});

document
.getElementById(page)
.classList.add("active");
}

function toast(msg){

const t =
document.getElementById("toast");

t.innerText = msg;
t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},2500);
}

document
.getElementById("registerBtn")
.onclick = ()=>{

const mobile =
document.getElementById("regMobile").value;

const password =
document.getElementById("regPassword").value;

const confirm =
document.getElementById("regConfirm").value;

const agree =
document.getElementById("agree").checked;

if(mobile.length!==10){
toast("Enter valid mobile number");
return;
}

if(password.length<6){
toast("Password minimum 6 characters");
return;
}

if(password!==confirm){
toast("Passwords do not match");
return;
}

if(!agree){
toast("Please accept terms");
return;
}

toast("Validation Success");
};

document
.getElementById("loginBtn")
.onclick = ()=>{

toast(
"Firebase Login will be added in Step 2"
);

};
</script>

</body>
</html>
