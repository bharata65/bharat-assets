<!DOCTYPE html>
<html lang="mr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass-panel w-full max-w-sm">
        <h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
        <p class="text-gray-400 mb-8">Login to your account</p>
        
        <input id="num" class="input-field" placeholder="Mobile Number">
        <input id="pin" type="password" class="input-field" placeholder="4 Digit PIN">
        
        <button onclick="login()" class="btn-premium mb-4">Login Securely</button>
        <p class="text-center text-sm">Don't have an account? <a href="#" class="text-blue-500 font-bold">Register</a></p>
    </div>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
