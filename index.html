<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARKAR CRACKER</title>
    <style>
        body { font-family: Arial; background: #000; color: #fff; padding: 15px; }
        .header { text-align: center; color: #ff0000; font-size: 28px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #444; }
        .btn { background: #ff0000; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">SARKAR CRACKER</div>

    <div class="box">
        <h3>WINGO 1 MINUTE SOFTWARE</h3>
        <p>Limit: 2700rs | Price: 203rs</p>
        <button class="btn" onclick="openPayment(203, 'WINGO 1 MIN')">BUY NOW (203rs)</button>
    </div>

    <div class="box">
        <h3>WINGO 30 SECOND</h3>
        <p>Limit: 2300rs | Price: 276rs</p>
        <button class="btn" onclick="openPayment(276, 'WINGO 30 SEC')">BUY NOW (276rs)</button>
    </div>

    <div class="box">
        <h3>WINGO 3 MINUTE</h3>
        <p>Limit: 3600rs | Price: 296rs</p>
        <button class="btn" onclick="openPayment(296, 'WINGO 3 MIN')">BUY NOW (296rs)</button>
    </div>

    <script>
        function openPayment(amount, productName) {
            let name = prompt("Enter Your Name:");
            let phone = prompt("Enter WhatsApp Number:");
            if(name && phone) {
                // डेटा सेव्ह करणे
                let user = { name: name, phone: phone, product: productName, amount: amount };
                let users = JSON.parse(localStorage.getItem('buyers') || "[]");
                users.push(user);
                localStorage.setItem('buyers', JSON.stringify(users));

                // Dynamic UPI QR Link
                let upiLink = `upi://pay?pa=YOUR_UPI@ID&pn=SARKAR_CRACKER&am=${amount}&cu=INR`;
                alert("पेमेंटसाठी QR कोड स्कॅन करा (अमाउंट: " + amount + "rs)");
                window.location.href = "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=" + encodeURIComponent(upiLink);
            }
        }
    </script>
</body>
</html>
