<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bharat Share's</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">

<div class="max-w-md mx-auto p-5">

<h1 class="text-3xl font-bold text-center mb-8">
Bharat Share's
</h1>

<input id="mobile"
class="w-full p-3 rounded mb-3 text-black"
placeholder="Mobile Number">

<input id="password"
type="password"
class="w-full p-3 rounded mb-3 text-black"
placeholder="Password">

<button
id="registerBtn"
class="w-full bg-green-600 p-3 rounded mb-3">
Register
</button>

<button
id="loginBtn"
class="w-full bg-blue-600 p-3 rounded">
Login
</button>

<p id="msg" class="mt-5 text-center"></p>

</div>

<script type="module" src="./js/auth.js"></script>

</body>
</html>
