<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bharat Share's - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; font-family: 'Poppins', sans-serif; }
        .input-glass { background: #111; border: 1px solid #333; color: white; }
        #toast { transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast-show { opacity: 1 !important; transform: translate(-50%, 0) !important; }
    </style>
</head>
<body class="flex flex-col min-h-screen relative">

    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 -translate-y-10 opacity-0 bg-red-600/90 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl z-50 pointer-events-none flex items-center gap-2 font-semibold">
        <span id="toast-msg">Error</span>
    </div>

    <header class="w-full bg-gradient-to-r from-blue-600 to-purple-600 p-6 shadow-xl text-center rounded-b-3xl">
        <h1 class="text-white text-2xl font-bold tracking-wider">Bharat Share's</h1>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-[#0a0a0a] border border-gray-800 p-6 rounded-3xl shadow-2xl">
            <h2 class="text-white text-2xl font-bold mb-6 text-center">Create Account</h2>
            
            <input type="text" id="name" placeholder="Full Name" class="input-glass w-full p-4 rounded-xl mb-4 focus:border-blue-500 outline-none transition-all">
            <input type="number" id="num" placeholder="10 Digit Mobile Number" class="input-glass w-full p-4 rounded-xl mb-4 focus:border-blue-500 outline-none transition-all" oninput="if(this.value.length > 10) this.value = this.value.slice(0, 10);">
            
            <div class="relative mb-4">
                <input type="password" id="pass" placeholder="4 Digit PIN" class="input-glass w-full p-4 pr-12 rounded-xl focus:border-blue-500 outline-none transition-all" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
                <span onclick="togglePassword('pass', 'eye-pass')" class="absolute right-4 top-4 cursor-pointer text-gray-500 hover:text-white transition-all">
                    <svg id="eye-pass" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </span>
            </div>

            <div class="relative mb-4">
                <input type="password" id="cpass" placeholder="Confirm 4 Digit PIN" class="input-glass w-full p-4 pr-12 rounded-xl focus:border-blue-500 outline-none transition-all" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
                <span onclick="togglePassword('cpass', 'eye-cpass')" class="absolute right-4 top-4 cursor-pointer text-gray-500 hover:text-white transition-all">
                    <svg id="eye-cpass" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </span>
            </div>
            
            <label class="flex items-center text-gray-400 text-sm mb-6 cursor-pointer">
                <input type="checkbox" id="agree" class="mr-3 w-4 h-4 accent-blue-600"> 
                I agree to the Terms & Privacy Policy
            </label>
            
            <button id="reg-btn" onclick="window.registerUser()" class="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700 text-white p-4 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/50">
                Continue
            </button>

            <p class="text-center text-gray-500 text-sm mt-6">
                Already have an account? 
                <a href="login.html" class="text-blue-500 font-bold hover:text-blue-400">Login</a>
            </p>
        </div>
    </main>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
            } else {
                input.type = "password";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
            }
        }
    </script>
    
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
