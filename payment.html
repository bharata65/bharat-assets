<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARKAR CRACKER | Payment</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .pay-card { background: #1e1e1e; padding: 25px; border-radius: 20px; border: 1px solid #FFD700; text-align: center; }
        .timer { color: #ff4757; font-size: 1.5rem; font-weight: bold; margin: 10px 0; }
        #qr-code { width: 220px; height: 220px; background: white; padding: 10px; border-radius: 10px; margin: 15px 0; }
        .btn { background: #FFD700; color: #000; padding: 15px; border: none; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; box-sizing: border-box; }
        /* Custom Popup Style */
        .popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .popup-content { background: #2c2c2c; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #FFD700; width: 80%; }
    </style>
</head>
<body>

<div class="pay-card">
    <h2 style="color: #FFD700;">ArUpiPay</h2>
    <div class="timer" id="timer">14:45</div>
    <div style="font-size: 20px;">Amount: ₹203.00</div>
    
    <img id="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=upi://pay?pa=7186024384801SB1024@mairtel&pn=SARKAR_CRACKER&am=203">
    
    <input type="text" id="utr" placeholder="Enter 12 digits UTR" maxlength="12">
    <button class="btn" onclick="openPopup()">SUBMIT UTR</button>
</div>

<div class="popup" id="successPopup">
    <div class="popup-content">
        <h3 style="color: #0f0;">Payment Successful!</h3>
        <p>Our team will verify your UTR shortly.</p>
        <button class="btn" onclick="window.location.href='home.html'">OK</button>
    </div>
</div>

<script>
    // Timer Logic
    let time = 885;
    setInterval(() => {
        let m = Math.floor(time/60);
        let s = time % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        time--;
    }, 1000);

    function openPopup() {
        let utr = document.getElementById('utr').value;
        if(utr.length == 12) {
            document.getElementById('successPopup').style.display = 'flex';
        } else {
            alert("Please enter a valid 12-digit UTR!");
        }
    }
</script>
</body>
</html>
