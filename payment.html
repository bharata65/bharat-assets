<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .gateway { background: #fff; color: #000; padding: 20px; border-radius: 10px; text-align: center; }
        #timer { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="gateway">
        <h3>ArUpiPay</h3>
        <p>Amount: ₹<span id="price"></span></p>
        <p id="timer">14:35</p>
        <img id="qrCode" src="" width="200">
        <p>1. Scan QR with another device.</p>
        <input type="text" id="utr" placeholder="Input 12 digits UTR">
        <button onclick="submitUtr()">Submit</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('price').innerText = params.get('amt');
        document.getElementById('qrCode').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=7186024384801SB1024@mairtel&am=" + params.get('amt');

        function submitUtr() {
            let utr = document.getElementById('utr').value;
            // हा डेटा ॲडमिनला पाठवण्यासाठी बॅकएंडची गरज आहे
            alert("UTR Submitted: " + utr + ". Please wait for activation.");
            window.location.href = "ritesh.html";
        }
    </script>
</body>
</html>
