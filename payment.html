<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARKAR CRACKER PAYMENT</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .pay-card { background: #1e1e1e; padding: 20px; border-radius: 20px; border: 1px solid #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .timer { color: #ff4757; font-weight: bold; font-size: 1.5rem; margin-bottom: 10px; }
        #qr-code { width: 220px; height: 220px; background: white; padding: 10px; border-radius: 10px; margin: 15px 0; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 15px; }
        .btn { background: #ffd700; color: #000; padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; width: 100%; }
        /* Advanced Popup Style */
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); }
        .popup { background: #fff; color: #000; padding: 25px; margin: 30% auto; width: 80%; border-radius: 15px; }
    </style>
</head>
<body>

<div class="pay-card">
    <h2 style="color: gold;">ArUpiPay</h2>
    <div class="timer" id="timer">14:59</div>
    <div id="price-display" style="font-size: 24px; font-weight: bold;">₹0.00</div>
    
    <img id="qr-code" src="">
    <p>1. Scan QR with UPI App<br>2. Input 12 digits UTR</p>
    
    <input type="text" id="utr" placeholder="Input 12 digits UTR">
    <button class="btn" onclick="showPopup()">SUBMIT UTR</button>
</div>

<div id="popup" class="overlay">
    <div class="popup">
        <h3>Success!</h3>
        <p>Payment request sent successfully. Redirecting...</p>
        <button onclick="window.location.href='home.html'" style="padding:10px 20px;">OK</button>
    </div>
</div>

<script>
    // URL वरून अमाऊंट घेणे
    const params = new URLSearchParams(window.location.search);
    const amount = params.get('price') || '203';
    document.getElementById('price-display').innerText = `₹${amount}.00`;
    document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=upi://pay?pa=7186024384801SB1024@mairtel&pn=SARKAR_CRACKER&am=${amount}&cu=INR`;

    // Timer logic
    let time = 899;
    setInterval(() => {
        let m = Math.floor(time/60);
        let s = time % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        time--;
    }, 1000);

    function showPopup() {
        if(document.getElementById('utr').value.length >= 12) {
            document.getElementById('popup').style.display = 'block';
        } else {
            alert("Please enter valid 12 digit UTR");
        }
    }
</script>
</body>
</html>
