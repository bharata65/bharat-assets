<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <h1 class="text-2xl font-bold mb-6">Market Admin Control</h1>
    <input id="price" type="number" placeholder="Enter New Price" class="w-full p-3 bg-gray-800 rounded mb-4">
    <button onclick="updateMarket()" class="w-full bg-red-600 p-4 rounded font-bold">Update Global Market</button>

    <script type="module">
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
        const db = getFirestore();
        
        window.updateMarket = async () => {
            const newPrice = document.getElementById('price').value;
            await updateDoc(doc(db, "market", "gold"), { price: newPrice });
            alert("Market Updated Successfully!");
        };
    </script>
</body>
</html>
