<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="p-4">
    <!-- Header Section -->
    <div class="glass-panel mb-6">
        <p class="text-gray-400 text-sm">Total Balance</p>
        <h1 class="text-4xl font-bold mt-1">₹0.00</h1>
        <div class="flex gap-4 mt-6">
            <button class="bg-blue-600 px-6 py-2 rounded-xl font-bold flex-1">Deposit</button>
            <button onclick="withdraw()" class="bg-gray-700 px-6 py-2 rounded-xl font-bold flex-1">Withdraw</button>
        </div>
    </div>

    <!-- Shares List -->
    <h2 class="text-xl font-bold mb-4">Market Assets</h2>
    <div id="shares-list" class="space-y-4">
        <!-- हे कार्ड्स आपोआप डेटाबेस मधून येतील -->
        <div class="glass-panel flex justify-between items-center">
            <div>
                <p class="font-bold">Reliance Power</p>
                <p class="text-green-500 text-sm">Price: ₹50</p>
            </div>
            <button class="bg-green-600 px-4 py-2 rounded-lg text-sm">Buy</button>
        </div>
    </div>

    <script>
        function withdraw() {
            // Locking System: युजरला इथेच अडकवायचे आहे
            alert("🔒 विथड्रॉलसाठी तुमचे अकाउंट 'VIP' असणे गरजेचे आहे. कृपया ₹२०० ची 'Activation Fee' भरा.");
        }
    </script>
</body>
</html>
