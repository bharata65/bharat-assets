<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bharat Share's - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; font-family: 'Poppins', sans-serif; color: white; padding-bottom: 80px; }
        .glass-card { background: #111; border: 1px solid #222; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bottom-nav { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #222; }
    </style>
    <script>
        // Security Check
        if (!localStorage.getItem("bharatUserSession")) {
            window.location.replace("login.html");
        }
        
        function logoutUser() {
            localStorage.removeItem("bharatUserSession"); 
            window.location.replace("login.html");
        }
    </script>
</head>
<body class="relative min-h-screen">

    <header class="w-full bg-gradient-to-r from-blue-600 to-purple-600 p-6 shadow-xl rounded-b-3xl flex justify-between items-center">
        <h1 class="text-white text-xl font-bold tracking-wider">Bharat Share's</h1>
        <button onclick="logoutUser()" class="bg-white/20 px-4 py-2 rounded-lg text-sm font-bold text-white hover:bg-white/30 transition">
            Logout
        </button>
    </header>

    <main class="p-4 mt-4 space-y-6">
        <div class="glass-card bg-gradient-to-br from-gray-900 to-black relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-600 rounded-full filter blur-3xl opacity-20 -mr-10 -mt-10"></div>
            <p class="text-gray-400 text-sm mb-1">Total Portfolio Value</p>
            <h2 class="text-4xl font-bold tracking-tight text-white mb-6">₹0.00</h2>
            
            <div class="flex gap-4">
                <button class="flex-1 bg-gradient-to-r from-green-500 to-green-700 py-3 rounded-xl font-bold shadow-lg">Deposit</button>
                <button class="flex-1 bg-gradient-to-r from-red-500 to-red-700 py-3 rounded-xl font-bold shadow-lg">Withdraw</button>
            </div>
        </div>

        <div class="flex justify-between items-end">
            <h3 class="text-xl font-bold">Top Assets</h3>
            <a href="#" class="text-blue-500 text-sm font-semibold">View All</a>
        </div>

        <div class="glass-card flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600/20 text-blue-500 rounded-full flex items-center justify-center font-bold text-xl">T</div>
                <div>
                    <h4 class="font-bold text-lg leading-tight">Tata Motors</h4>
                    <p class="text-green-400 text-sm font-semibold">+2.45%</p>
                </div>
            </div>
            <div class="text-right">
                <h4 class="font-bold text-lg leading-tight">₹1,024.50</h4>
                <button class="bg-blue-600 px-4 py-1 mt-1 rounded-lg text-sm font-bold">Buy</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav fixed bottom-0 left-0 w-full flex justify-around items-center py-4 px-2 z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-blue-500 transition">
            <span class="text-xs font-bold mt-1">Home</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-500 hover:text-white transition">
            <span class="text-xs font-bold mt-1">Shares</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-500 hover:text-white transition">
            <span class="text-xs font-bold mt-1">Account</span>
        </a>
    </nav>

</body>
</html>
