<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Share's | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <!-- Brand Header -->
    <div class="brand-header">Bharat Share's</div>

    <div class="p-4">
        <!-- Balance Section -->
        <div class="glass-panel text-center mb-6">
            <p class="text-gray-400">Total Balance</p>
            <h1 class="text-4xl font-bold mt-2">₹0.00</h1>
            
            <!-- Quick Actions -->
            <div class="flex gap-4 mt-6">
                <a href="deposit.html" class="flex-1 bg-green-600 py-3 rounded-xl font-bold">Deposit</a>
                <a href="withdraw.html" class="flex-1 bg-red-600 py-3 rounded-xl font-bold">Withdraw</a>
            </div>
        </div>

        <!-- Shares Section -->
        <h2 class="text-xl font-bold mb-4">Available Assets</h2>
        <div id="shares-container" class="space-y-4">
            <!-- एडमिन पॅनेलवरून येणारे शेअर्स इथे दिसतील -->
            <div class="glass-panel flex justify-between items-center">
                <div>
                    <p class="font-bold">Gold ETF</p>
                    <p class="text-blue-400 text-sm">Price: ₹5,200</p>
                </div>
                <button class="bg-blue-600 px-6 py-2 rounded-lg font-bold">Buy</button>
            </div>
        </div>
    </div>
</body>
</html>
